workflows:
  ios-build:
    name: Build NSOJUNE Unsigned IPA
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build Unsigned App
        script: |
          # 1. Build tự nhiên bằng tên gốc từ Unity xuất ra để tránh lỗi compile gãy liên kết
          xcodebuild build \
            -project "Unity-iPhone.xcodeproj" \
            -scheme "Unity-iPhone" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR/build_output
      - name: Phẫu thuật đổi tên thành NSOJUNE, bơm file Privacy và đóng gói IPA
        script: |
          cd $CM_BUILD_DIR/build_output
          
          # Tìm thư mục app (.app) vừa được Xcode kết xuất ra
          APP_DIR=$(find . -name "*.app" -type d | head -n 1)
          APP_NAME=$(basename "$APP_DIR" .app)
          
          # 2. Đổi tên lõi binary thực thi bên trong thành NSOJUNE
          mv "$APP_DIR/$APP_NAME" "$APP_DIR/NSOJUNE"
          
          # 3. Sửa lại các thông số CFBundle trong giấy khai sinh Info.plist cho khớp tên mới
          plutil -replace CFBundleExecutable -string "NSOJUNE" "$APP_DIR/Info.plist"
          plutil -replace CFBundleName -string "NSOJUNE" "$APP_DIR/Info.plist"
          
          # 4. Bơm file mã độc/bảo mật giả lập PrivacyInfo vào thẳng UnityFramework để qua mặt bộ quét của Apple
          cat <<EOF > "$APP_DIR/Frameworks/UnityFramework.framework/PrivacyInfo.xcprivacy"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>NSPrivacyTracking</key>
              <false/>
              <key>NSPrivacyCollectedDataTypes</key>
              <array/>
              <key>NSPrivacyAccessedAPITypes</key>
              <array>
                  <dict>
                      <key>NSPrivacyAccessedAPIType</key>
                      <string>NSPrivacyAccessedAPICategorySystemBootTime</string>
                      <key>NSPrivacyAccessedAPITypeReasons</key>
                      <array><string>35F9.1</string></array>
                  </dict>
                  <dict>
                      <key>NSPrivacyAccessedAPIType</key>
                      <string>NSPrivacyAccessedAPICategoryFileTimestamp</string>
                      <key>NSPrivacyAccessedAPITypeReasons</key>
                      <array><string>C617.1</string></array>
                  </dict>
                  <dict>
                      <key>NSPrivacyAccessedAPIType</key>
                      <string>NSPrivacyAccessedAPICategoryUserDefaults</string>
                      <key>NSPrivacyAccessedAPITypeReasons</key>
                      <array><string>CA92.1</string></array>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF
          
          # 5. Đổi tên thư mục vỏ bọc bên ngoài thành NSOJUNE.app
          mv "$APP_DIR" "NSOJUNE.app"
          
          # 6. Đóng gói nén thành file IPA theo đúng cấu trúc Payload tiêu chuẩn
          mkdir -p $CM_BUILD_DIR/build/ios/ipa/Payload
          cp -r "NSOJUNE.app" $CM_BUILD_DIR/build/ios/ipa/Payload/
          cd $CM_BUILD_DIR/build/ios/ipa
          zip -qr NSOJUNE_Unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
